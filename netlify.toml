[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NEXT_TURBOPACK = "false"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  
# Increase function timeout and memory for large EPUB processing
[functions."*"]
  memory = 1024
  timeout = 60

# Increase request body size limit for large EPUB files
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
